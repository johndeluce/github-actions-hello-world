name: Good Morning Workflow

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

  
jobs:
  good-morning:
    runs-on: ubuntu-latest

    steps:
      - name: Greet
        run: echo "Good Morning!"
      
      - name: Print Date and Time
        run: date

      - name: Complete
        run: echo "Job Complete!"